<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memory Space</title>
<style>
  @font-face {
    font-family: 'OneUI Sans';
    src: url('assets/OneUISansGUI-400Regular%231.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    font-family: 'OneUI Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh;
  }
  #canvas {
    width: 384px;
    height: 826px;
    overflow: hidden;
    position: relative;
    background: #111;
  }
  #canvas-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 2389px;
    height: 4272px;
    transform: translate(-50%, -50%);
    background: url('https://www.iamsterdam.com/_next/image?url=https://app.thefeedfactory.nl/api/assets/6437c3c9b948490faad18ba0/_Stedelijk_Museum___2_.webp&w=3840&q=75') center/cover no-repeat;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 200;
    padding: 20px 0 15px;
    background: none;
    transition: opacity 0.4s ease;
  }
  #filters {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 0 20px;
    background: rgba(0,0,0,0.62);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    border-radius: 40px;
    padding: 0 10px;
  }
  #filters button {
    background: none;
    border: none;
    border-radius: 20px;
    padding: 10px;
    color: white;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: -0.24px;
    line-height: 1.2;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: capitalize;
  }
  #filters button.active {
    color: rgba(255,255,255,0.4);
  }

  /* Scrollable area */
  #scroll-area {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    touch-action: none;
    transition: opacity 0.4s ease;
  }

  /* Cards container */
  #cards {
    position: absolute;
    left: 0;
    width: 384px;
    height: 3500px;
  }

  /* Memory card */
  .mem-card {
    position: absolute;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease, filter 0.3s ease;
  }

  /* Note type */
  .mem-card .note-inner {
    width: 100%; height: 100%;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .mem-card .note-inner p {
    color: #1a1a1a;
    font-family: Georgia, serif;
    font-style: italic;
    line-height: 1.4;
    margin: 0;
  }

  /* Music type */
  .mem-card .music-inner {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .mem-card .music-inner .play-btn {
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mem-card .music-inner .play-btn .triangle {
    width: 0; height: 0;
    border-top: solid transparent;
    border-bottom: solid transparent;
    border-left: solid rgba(255,255,255,0.8);
  }
  .mem-card .music-inner p {
    color: rgba(255,255,255,0.9);
    font-weight: 500;
    margin: 0;
    line-height: 1.3;
  }

  /* Photo/screenshot type */
  .mem-card .photo-inner {
    width: 100%; height: 100%;
    position: relative;
  }

  /* ============================================================ */
  /* EXPANDED VIEW                                                 */
  /* ============================================================ */

  #expanded {
    position: absolute;
    inset: 0;
    z-index: 400;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #expanded.visible {
    opacity: 1;
    pointer-events: auto;
  }
  #exp-image {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 475px;
    background-size: cover;
    background-position: center;
    cursor: pointer;
  }
  #exp-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 351px;
    background: rgba(0,0,0,0.62);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    padding: 17px 20px;
    overflow-y: auto;
  }
  .exp-content {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .exp-top {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  .exp-text-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .exp-text-group .dim-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .exp-text-group .dim-label {
    font-size: 10px;
    color: white;
    letter-spacing: -0.2px;
    line-height: 1.2;
    text-transform: capitalize;
  }
  .exp-text-group .type-label {
    color: #777;
    font-size: 10px;
    letter-spacing: -0.2px;
    line-height: 1.2;
    text-transform: capitalize;
  }
  .exp-text-group h3 {
    color: white;
    font-size: 16px;
    font-weight: 400;
    margin: 0;
    line-height: 1.2;
    letter-spacing: -0.32px;
  }
  .exp-top .tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .exp-top .tags span {
    background: rgba(0,0,0,0.4);
    -webkit-backdrop-filter: blur(9.5px);
    backdrop-filter: blur(9.5px);
    border-radius: 20px;
    padding: 8px 10px;
    color: white;
    font-size: 10px;
    letter-spacing: -0.2px;
    line-height: 1.2;
  }
  .exp-connected {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .exp-connected .connected-label {
    color: white;
    font-size: 10px;
    letter-spacing: -0.2px;
    line-height: 1.2;
    text-transform: uppercase;
  }
  .exp-connected .connected-row {
    display: flex;
    gap: 10px;
  }
  .exp-connected .connected-card {
    width: 80px; height: 80px;
    border-radius: 10px;
    background: rgba(0,0,0,0.79);
    -webkit-backdrop-filter: blur(9.5px);
    backdrop-filter: blur(9.5px);
    display: flex;
    align-items: flex-end;
    padding: 10px;
    cursor: pointer;
    flex-shrink: 0;
    overflow: hidden;
  }
  .exp-source {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .exp-source .source-label {
    color: white;
    font-size: 10px;
    letter-spacing: -0.2px;
    line-height: 1.2;
    text-transform: uppercase;
  }
  .exp-source .source-icon {
    width: 20px;
    height: 20px;
    display: block;
  }
</style>

  { id: 18, type: "photo", title: "Peckham sunset from roof", tags: ["london", "home", "light"], dimension: "places", color: "#D4826A", accent: "#C07080", ratio: 1.4, x: 280, y: 2300, z: -30, img: IMAGES[1] },
  { id: 19, type: "screenshot", title: "Tadao Ando — Church of Light", tags: ["architecture", "inspiration", "light"], dimension: "identity", color: "#8A8A80", accent: "#907868", ratio: 1.2, x: 160, y: 2450, z: 90, img: IMAGES[10] },
  { id: 20, type: "photo", title: "Japanese breakfast I made", tags: ["food", "japan", "cooking"], dimension: "experiences", color: "#C4B896", accent: "#C09868", ratio: 0.75, x: 50, y: 2580, z: -160, img: IMAGES[6] },
  { id: 21, type: "photo", title: "Dad at Douro river", tags: ["porto", "family", "river"], dimension: "people", color: "#6A94A8", accent: "#6088A8", ratio: 1.3, x: 300, y: 2700, z: 60, img: IMAGES[5] },
  { id: 22, type: "music", title: "DJ Nigga Fox — Noite e Dia", tags: ["lisbon", "electronic", "night"], dimension: "identity", color: "#4A3A5C", accent: "#5A4870", ratio: 1, x: 120, y: 2850, z: -110, img: IMAGES[16] },
  { id: 23, type: "photo", title: "Typography on Peckham wall", tags: ["london", "typography", "street"], dimension: "identity", color: "#7A7A6E", accent: "#A0A098", ratio: 1.5, x: 320, y: 2950, z: 140, img: IMAGES[3] },
  { id: 24, type: "photo", title: "Porto — Sé cathedral stairs", tags: ["porto", "architecture", "stone"], dimension: "places", color: "#B8A080", accent: "#C8A070", ratio: 1.4, x: 80, y: 3100, z: -40, img: IMAGES[0] },
  { id: 25, type: "note", title: "I cook mum's recipes to feel close to her when I'm far away", tags: ["family", "food", "porto"], dimension: "people", color: "#2C2C2C", accent: "#3A3A3A", ratio: 0.9, x: 250, y: 3250, z: 100 },
];

const DIM_COLORS = {
  identity: "#1b1553",
  people: "#b184b5",
  places: "#7083bc",
  experiences: "#3585ab",
  joy: "#fa8778",
};

// ============================================================
// STATE
// ============================================================

let scrollY = 0;
let selected = null;
let activeFilter = null;

// ============================================================
// DOM REFS
// ============================================================

const canvas = document.getElementById('canvas');
const scrollArea = document.getElementById('scroll-area');
const cardsContainer = document.getElementById('cards');
const filtersEl = document.getElementById('filters');
const expandedEl = document.getElementById('expanded');
const expImage = document.getElementById('exp-image');
const headerEl = document.getElementById('header');

// ============================================================
// BUILD FILTER BUTTONS
// ============================================================

Object.entries(DIM_COLORS).forEach(([dim, col]) => {
  const btn = document.createElement('button');
  btn.textContent = dim;
  btn.dataset.dim = dim;
  btn.dataset.color = col;
  btn.addEventListener('click', () => {
    if (selected) return;
    activeFilter = activeFilter === dim ? null : dim;
    updateFilters();
    render();
  });
  filtersEl.appendChild(btn);
});

function updateFilters() {
  filtersEl.querySelectorAll('button').forEach(btn => {
    const dim = btn.dataset.dim;
    btn.classList.toggle('active', activeFilter === dim);
  });
}

// ============================================================
// BUILD MEMORY CARDS
// ============================================================

const cardEls = [];

MEMORIES.forEach(mem => {
  const card = document.createElement('div');
  card.className = 'mem-card';
  card.dataset.id = mem.id;

  if (mem.type === 'note') {
    card.innerHTML = `
      <div class="note-inner">
        <p>${mem.title}</p>
      </div>`;
  } else if (mem.type === 'music') {
    const musicBg = mem.img
      ? `background: url('${mem.img}') center/cover no-repeat`
      : `background: linear-gradient(135deg, ${mem.color}, ${mem.color}dd)`;
    card.innerHTML = `
      <div class="music-inner" style="${musicBg}">
        <div class="play-btn"><div class="triangle"></div></div>
      </div>`;
  } else {
    const bgStyle = mem.img
      ? `background: url('${mem.img}') center/cover no-repeat`
      : `background: linear-gradient(145deg, ${mem.color}ee, ${mem.color}88)`;
    card.innerHTML = `
      <div class="photo-inner" style="${bgStyle}">
      </div>`;
  }

  card.addEventListener('click', () => {
    if (selected) return;
    selected = mem.id;
    openExpanded(mem);
    render();
  });

  cardsContainer.appendChild(card);
  cardEls.push({ el: card, mem });
});

// ============================================================
// RENDER
// ============================================================

function render() {
  const filteredIds = activeFilter
    ? new Set(MEMORIES.filter(m => m.dimension === activeFilter || m.tags.includes(activeFilter)).map(m => m.id))
    : null;

  cardEls.forEach(({ el, mem }) => {
    if (filteredIds && !filteredIds.has(mem.id)) {
      el.style.display = 'none';
      return;
    }

    const viewY = mem.y - scrollY + 130;
    if (viewY < -200 || viewY > 1100) {
      el.style.display = 'none';
      return;
    }

    const distFromCenter = Math.abs(viewY - 413);
    const scale = Math.max(0.5, 1 - distFromCenter / 1200);
    const baseW = 180;
    const w = baseW * scale;
    const h = w * mem.ratio;
    const isSelected = selected === mem.id;

    el.style.display = 'block';
    el.style.left = (mem.x * scale - w / 2 + 192 - 192 * scale) + 'px';
    el.style.top = (130 - scrollY + mem.y * scale - h / 2) + 'px';
    el.style.width = w + 'px';
    el.style.height = h + 'px';
    el.style.borderRadius = (mem.type === 'note' ? 12 : 20) * scale + 'px';
    el.style.opacity = 1;
    el.style.transform = isSelected ? 'scale(1.4)' : 'scale(1)';
    el.style.filter = (selected && !isSelected) ? 'blur(4px)' : 'none';
    el.style.zIndex = isSelected ? 100 : Math.round(scale * 10);
    el.style.pointerEvents = (scale > 0.3 && !selected) ? 'auto' : 'none';
    el.style.boxShadow = `0 ${4 * scale}px ${16 * scale}px rgba(0,0,0,0.2)`;

    // Scale inner text
    const noteP = el.querySelector('.note-inner p');
    if (noteP) {
      noteP.style.fontSize = Math.max(8, 11 * scale) + 'px';
      noteP.style.padding = (10 * scale) + 'px';
    }

    const musicInner = el.querySelector('.music-inner');
    if (musicInner) {
      musicInner.style.padding = (10 * scale) + 'px';
      const playBtn = musicInner.querySelector('.play-btn');
      if (playBtn) {
        playBtn.style.width = (20 * scale) + 'px';
        playBtn.style.height = (20 * scale) + 'px';
      }
      const tri = musicInner.querySelector('.triangle');
      if (tri) {
        tri.style.borderLeftWidth = (6 * scale) + 'px';
        tri.style.borderTopWidth = (4 * scale) + 'px';
        tri.style.borderBottomWidth = (4 * scale) + 'px';
        tri.style.marginLeft = (2 * scale) + 'px';
      }
    }
  });

  // Fade header when expanded
  headerEl.style.opacity = selected ? '0' : '1';
  headerEl.style.pointerEvents = selected ? 'none' : 'auto';
}

// ============================================================
// EXPANDED VIEW
// ============================================================

function openExpanded(mem) {
  // Set background to accent color
  expandedEl.style.background = mem.accent;

  // Set image
  if (mem.img) {
    expImage.style.background = `url('${mem.img}') center/cover no-repeat`;
  } else if (mem.type === 'note') {
    expImage.style.background = '#ffffff';
    expImage.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:40px">
      <p style="color:#1a1a1a;font-family:Georgia,serif;font-style:italic;font-size:20px;line-height:1.5;text-align:center">${mem.title}</p>
    </div>`;
  } else {
    expImage.style.background = `linear-gradient(145deg, ${mem.color}ee, ${mem.color}88)`;
  }

  // Populate detail
  document.getElementById('exp-dim').textContent = mem.dimension;
  document.getElementById('exp-type').textContent = mem.type;
  document.getElementById('exp-title').textContent = mem.title;
  document.getElementById('exp-tags').innerHTML = mem.tags.map(t => `<span>${t}</span>`).join('');

  // Connected cards
  const related = MEMORIES.filter(m => m.id !== mem.id && m.tags.some(t => mem.tags.includes(t))).slice(0, 3);
  const connEl = document.getElementById('exp-connected');
  const relEl = document.getElementById('exp-related');

  if (related.length > 0) {
    connEl.style.display = 'flex';
    relEl.innerHTML = related.map(rm => {
      const bg = rm.img
        ? `background: url('${rm.img}') center/cover no-repeat`
        : `background: rgba(0,0,0,0.79)`;
      return `<div class="connected-card" data-id="${rm.id}" style="${bg}"></div>`;
    }).join('');

    relEl.querySelectorAll('.connected-card').forEach(card => {
      card.addEventListener('click', () => {
        const targetId = parseInt(card.dataset.id);
        const targetMem = MEMORIES.find(m => m.id === targetId);
        if (targetMem) {
          selected = targetId;
          expImage.innerHTML = '';
          openExpanded(targetMem);
          render();
        }
      });
    });
  } else {
    connEl.style.display = 'none';
  }

  // Show
  expandedEl.classList.add('visible');
}

function closeExpanded() {
  expandedEl.classList.remove('visible');
  expImage.innerHTML = '';
  selected = null;
  render();
}

// Close on image click
expImage.addEventListener('click', closeExpanded);

// Close on Esc
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && selected) {
    closeExpanded();
  }
});

// ============================================================
// GESTURES
// ============================================================

let touchLastY = 0;

scrollArea.addEventListener('touchstart', function(e) {
  if (selected) return;
  e.preventDefault();
  touchLastY = e.touches[0].clientY;
}, { passive: false });

scrollArea.addEventListener('touchmove', function(e) {
  if (selected) return;
  e.preventDefault();
  const y = e.touches[0].clientY;
  const dy = touchLastY - y;
  scrollY = Math.max(0, Math.min(scrollY + dy * 1.5, 2800));
  touchLastY = y;
  render();
}, { passive: false });

scrollArea.addEventListener('wheel', function(e) {
  if (selected) return;
  e.preventDefault();
  scrollY = Math.max(0, Math.min(scrollY + e.deltaY, 2800));
  render();
}, { passive: false });

// Mouse drag
let mouseDown = false;
let mouseLastY = 0;

scrollArea.addEventListener('mousedown', function(e) {
  if (selected) return;
  mouseDown = true;
  mouseLastY = e.clientY;
});

scrollArea.addEventListener('mousemove', function(e) {
  if (!mouseDown || selected) return;
  const dy = mouseLastY - e.clientY;
  scrollY = Math.max(0, Math.min(scrollY + dy * 1.5, 2800));
  mouseLastY = e.clientY;
  render();
});

document.addEventListener('mouseup', function() {
  mouseDown = false;
});

// ============================================================
// INIT
// ============================================================

updateFilters();
render();
</script>
</body>
</html>
